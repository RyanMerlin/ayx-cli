name: Build Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true
          components: rustfmt, clippy
      - name: Build release
        run: cargo build --release
        env:
          CARGO_TERM_COLOR: always
      - name: Run clippy
        run: cargo clippy -- -D warnings
        env:
          CARGO_TERM_COLOR: always
