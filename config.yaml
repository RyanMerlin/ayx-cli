profile_name: local-dev
mongo:
  mode: embedded  # switch to 'managed' and fill mongo.managed.* when targeting an external MongoDB.
  databases:
    gallery_name: AlteryxGallery
    service_name: AlteryxService
  embedded:
    runtime_settings_path: null     # auto-discovered from ProgramData/ProgramFiles when null; set explicitly to override.
    alteryx_service_path: null     # auto-resolves from RuntimeSettings install paths but can be pinned.
    restore_target_path: null      # derived from RuntimeSettings when available.
  managed:
    url: null                      # prefer a MongoDB URI when hitting a managed cluster.
    host: localhost
    port: 27017
    auth_database: admin
    username: mongo_user
    password: REPLACE_WITH_SECRET
    tls:
      enabled: false
      ca_path: null
      cert_path: null
      key_path: null
      allow_invalid_hostnames: false
    timeout_ms: 15000
    retry_count: 2
    max_pool_size: 20
